<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Pagos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />
    <style>
      body {
        background-color: #f4f6f9;
      }

      .btn-menu {
        border-radius: 12px;
        transition: all 0.3s ease;
        color: white;
        text-align: left;
      }

      .btn-menu:hover {
        transform: translateX(5px);
        background-color: rgba(255, 255, 255, 0.2);
        color: white;
      }
    </style>
  </head>

  <body>
    <div class="d-flex">
      <div
        class="text-white p-3"
        style="
          width: 220px;
          height: 100vh;
          background: linear-gradient(135deg, #1ecee6, #194e9ec9);
        "
      >
        <div class="text-center">
          <img src="./imagenes/creditech_logo.png" alt="logo" height="100" />
        </div>
        <hr />
        <div class="d-grid gap-2">
          <a href="dashboard.html" class="btn btn-outline-light btn-menu">
            Dashboard
          </a>

          <a href="clientes.html" class="btn btn-outline-light btn-menu">
            Clientes
          </a>

          <a href="credito.html" class="btn btn-outline-light btn-menu">
            Créditos
          </a>

          <a href="#" class="btn btn-light btn-menu text-primary"> Pagos </a>
        </div>
      </div>

      <div class="container p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="mb-0">Pagos de clientes</h2>

          <div
            class="card shadow-sm border-0"
            style="border-radius: 12px; width: 190px"
          >
            <div class="card-body d-flex align-items-center p-2">
              <!-- Icono -->
              <img
                src="https://cdn-icons-png.flaticon.com/512/847/847969.png"
                alt="user"
                width="30"
                class="me-2"
              />

              <!-- Texto -->
              <div>
                <small class="text-muted">Usuario</small>
                <h6 class="mb-0" style="font-size: 14px">Juan Pérez</h6>
              </div>
            </div>
          </div>
        </div>

        <a href="registro_pago.html" class="btn btn-primary btn-nuevo mb-3">
          <i class="bi bi-person-plus-fill"></i>
          Registrar Pago
        </a>

        <div class="table-responsive">
          <table class="table table-striped table-hover shadow-sm">
            <thead class="table-primary">
              <tr>
                <th>ID</th>
                <th>Cliente</th>
                <th>Cuota</th>
                <th>Monto</th>
                <th>Fecha</th>
                <th>Método</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>

            <tbody>
              <tr>
                <td>1</td>
                <td>Juan Pérez</td>
                <td>#3</td>
                <td>Gs. 250.000</td>
                <td>10/05/2026</td>
                <td>Efectivo</td>
                <td><span class="badge bg-success">Pagado</span></td>
                <td>
                  <a href="historial_pago.html" class="btn btn-link btn-sm p-0 me-2">Ver historial</a>
                  <button class="btn btn-warning btn-sm">
                    <i class="bi bi-pencil-fill"></i>
                  </button>
                  <button class="btn btn-danger btn-sm">
                    <i class="bi bi-trash-fill"></i>
                  </button>
                </td>
              </tr>

              <tr>
                <td>2</td>
                <td>María Gómez</td>
                <td>#1</td>
                <td>Gs. 180.000</td>
                <td>15/05/2026</td>
                <td>Transferencia</td>
                <td><span class="badge bg-danger">Pendiente</span></td>
                <td>
                  <a href="historial_pago.html" class="btn btn-link btn-sm p-0 me-2">Ver historial</a>
                  <button class="btn btn-warning btn-sm">
                    <i class="bi bi-pencil-fill"></i>
                  </button>
                  <button class="btn btn-danger btn-sm">
                    <i class="bi bi-trash-fill"></i>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
